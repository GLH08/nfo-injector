services:
  nfo-injector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nfo-injector
    ports:
      - "18880:18880"
    volumes:
      # Single parent mount covering all STRM + Media sources.
      # FUSE（CloudDrive2 等）是 /apps 下的子挂载；仅 privileged 不够，
      # 必须 bind propagation: rshared，容器内 exists()/iterdir() 才能看到网盘文件。
      - type: bind
        source: /apps
        target: /apps
        bind:
          propagation: rshared
      # Persist configuration and logs
      - ./data:/app/data
    privileged: true
    environment:
      # Only for seeding initial library when config.json doesn't exist
      - STRM_ROOT=/apps/moviepilot/115strm/Emby
      - MEDIA_ROOT=/apps/clouddrive2/CloudDrive/115open/Media
      - TZ=Asia/Shanghai
    restart: unless-stopped
